name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-to-hf-space:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE_NAME: ${{ vars.HF_SPACE_NAME }}
        run: |
          HF_TOKEN_CLEAN="$(printf '%s' "$HF_TOKEN" | tr -d '\r\n' | xargs)"
          HF_USERNAME_CLEAN="$(printf '%s' "$HF_USERNAME" | tr -d '\r\n' | xargs)"
          HF_SPACE_NAME_CLEAN="$(printf '%s' "$HF_SPACE_NAME" | tr -d '\r\n' | xargs)"

          if [ -z "$HF_TOKEN_CLEAN" ] || [ -z "$HF_USERNAME_CLEAN" ] || [ -z "$HF_SPACE_NAME_CLEAN" ]; then
            echo "Missing required configuration."
            echo "Set secret HF_TOKEN and variables HF_USERNAME + HF_SPACE_NAME in GitHub repo settings."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add hf "https://${HF_USERNAME_CLEAN}:${HF_TOKEN_CLEAN}@huggingface.co/spaces/${HF_USERNAME_CLEAN}/${HF_SPACE_NAME_CLEAN}.git"
          git push --force hf HEAD:main